<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>羽球場地費計算 - LINE版</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif; background-color: #f3f4f6; }
        .animate-fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        const INITIAL_MEMBERS = ["秀屏", "銘璟", "硯翎", "淑雅", "嬿如", "惠絜", "佑霖", "詠心", "冠宇", "儷芬"];
        const getDefaultUnits = (name) => ["惠絜", "佑霖", "詠心"].includes(name) ? 1 : 1.5;

        const App = () => {
            const [totalCost, setTotalCost] = useState("500");
            const [guestName, setGuestName] = useState(""); 
            const [isLiffReady, setIsLiffReady] = useState(false);
            const [members, setMembers] = useState(INITIAL_MEMBERS.map((name, index) => ({
                id: `init-${index}`, name, selected: name !== "冠宇" && name !== "儷芬", units: getDefaultUnits(name), isGuest: false
            })));

            // LIFF 初始化
            useEffect(() => {
                liff.init({ liffId: "2009442730-v11Bpsm8" }) // 
                    .then(() => { setIsLiffReady(true); })
                    .catch((err) => console.error("LIFF 初始化失敗", err));
            }, []);

            const calculationResult = useMemo(() => {
                const activeMembers = members.filter(m => m.selected);
                const totalUnits = activeMembers.reduce((sum, m) => sum + m.units, 0);
                const costPerUnit = totalUnits > 0 && totalCost ? (parseFloat(totalCost) / totalUnits) : 0;
                const results = activeMembers.map(m => ({ ...m, finalCost: Math.ceil(Number((m.units * costPerUnit).toFixed(5))) }));
                return { results, totalUnits, costPerUnit, calculatedTotal: results.reduce((sum, item) => sum + item.finalCost, 0) };
            }, [members, totalCost]);

            const toggleMember = (id) => setMembers(prev => prev.map(m => m.id === id ? { ...m, selected: !m.selected } : m));
            const setMemberUnits = (id, units) => setMembers(prev => prev.map(m => m.id === id ? { ...m, units } : m));
            
            const handleSend = () => {
                const date = new Date().toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric' });
                let text = `📅 ${date} 羽球費用計算\n----------------\n💰 場地總費: $${totalCost || 0}\n👥 分攤人數: ${calculationResult.results.length}人\n\n`;
                calculationResult.results.forEach(r => {
                    text += `${r.name}: $${r.finalCost}${r.units !== 1.5 ? ` (${r.units}小時)` : ''}\n`;
                });

                if (liff.isInClient()) {
                    liff.sendMessages([{ type: 'text', text: text }])
                        .then(() => liff.closeWindow())
                        .catch((err) => alert("傳送失敗: " + err));
                } else {
                    navigator.clipboard.writeText(text);
                    alert("已複製結果（非LINE環境）");
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen bg-gray-100 pb-32">
                    <div className="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-10 flex justify-between items-center">
                        <h1 className="text-xl font-bold"><i className="fas fa-calculator mr-2"></i>羽球費用分攤</h1>
                    </div>

                    <div className="p-4 space-y-6">
                        <div className="bg-white p-4 rounded-xl shadow-sm">
                            <label className="block text-sm font-medium text-gray-700 mb-1">本次場地總費用</label>
                            <input type="number" value={totalCost} onChange={(e) => setTotalCost(e.target.value)} className="w-full p-3 bg-gray-50 border rounded-lg text-2xl font-bold" />
                        </div>

                        <div className="space-y-3">
                            {members.map((member) => (
                                <div key={member.id} className={`p-3 rounded-xl border-2 transition-all ${member.selected ? 'bg-blue-50 border-blue-500' : 'bg-white border-transparent'}`} onClick={() => toggleMember(member.id)}>
                                    <div className="flex items-center justify-between">
                                        <span className="text-lg font-medium">{member.name}</span>
                                        {member.selected && <span className="text-xl font-bold text-blue-600">${calculationResult.results.find(r => r.id === member.id)?.finalCost}</span>}
                                    </div>
                                    {member.selected && (
                                        <div className="mt-2 flex gap-2 justify-end" onClick={(e) => e.stopPropagation()}>
                                            {[2, 1.5, 1].map(u => (
                                                <button key={u} onClick={() => setMemberUnits(member.id, u)} className={`px-3 py-1 rounded-md text-xs ${member.units === u ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-500'}`}>{u}時</button>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="fixed bottom-0 left-0 right-0 bg-white p-4 shadow-lg max-w-md mx-auto border-t">
                        <button onClick={handleSend} className="w-full bg-green-600 hover:bg-green-700 text-white py-4 rounded-xl font-bold text-lg shadow-lg transition-transform active:scale-95">
                            <i className="fab fa-line mr-2"></i>傳送結果至群組
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
